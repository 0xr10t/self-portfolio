<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soham Vijay | 0xr10t Portfolio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/fira-code@5.1.1/index.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --term-bg: #0a0a0a;
            --text-color: #33ff33;
            --dim-color: #1a801a;
            --prompt-color: #ffaa00;
            --link-color: #00ffff;
            --error-color: #ff3333;
            --highlight-color: #ffffff;
            --font-stack: 'Fira Code', monospace;
            --scanline-opacity: 0.05;
            --glow-amount: 0px 0px 5px var(--text-color);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-stack);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Scanline and CRT Effects */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 1000;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0;
            z-index: 1000;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.027906; }
            5% { opacity: 0.041475; }
            10% { opacity: 0.010336; }
            15% { opacity: 0.048982; }
            20% { opacity: 0.016944; }
            25% { opacity: 0.060326; }
            30% { opacity: 0.018039; }
            35% { opacity: 0.052532; }
            40% { opacity: 0.012515; }
            45% { opacity: 0.046591; }
            50% { opacity: 0.020722; }
            55% { opacity: 0.056678; }
            60% { opacity: 0.014111; }
            65% { opacity: 0.041612; }
            70% { opacity: 0.026534; }
            75% { opacity: 0.058192; }
            80% { opacity: 0.015482; }
            85% { opacity: 0.047291; }
            90% { opacity: 0.023752; }
            95% { opacity: 0.050114; }
            100% { opacity: 0.029925; }
        }

        #terminal-container {
            width: 100%;
            max-width: 1000px;
            height: 100%;
            max-height: 800px;
            background-color: var(--term-bg);
            border: 2px solid var(--dim-color);
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(51, 255, 51, 0.2);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        #title-bar {
            background-color: var(--dim-color);
            color: var(--bg-color);
            padding: 5px 10px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--text-color);
            user-select: none;
        }

        .window-controls span {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--bg-color);
            margin-left: 5px;
        }

        #terminal-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 15px;
            line-height: 1.5;
            text-shadow: var(--glow-amount);
            scroll-behavior: smooth;
        }

        #terminal-body::-webkit-scrollbar {
            width: 8px;
        }

        #terminal-body::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        #terminal-body::-webkit-scrollbar-thumb {
            background: var(--dim-color);
            border-radius: 4px;
        }

        #output-area {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .input-line {
            display: flex;
            align-items: center;
            margin-top: 5px;
        }

        .prompt-text {
            color: var(--prompt-color);
            margin-right: 10px;
            font-weight: bold;
            white-space: nowrap;
        }

        #cmd-input {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-family: var(--font-stack);
            font-size: 15px;
            flex: 1;
            outline: none;
            text-shadow: var(--glow-amount);
            caret-color: transparent;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background-color: var(--text-color);
            animation: blink 1s step-end infinite;
            margin-left: -10px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        a {
            color: var(--link-color);
            text-decoration: underline;
            text-underline-offset: 4px;
            transition: color 0.2s;
        }

        a:hover {
            color: var(--highlight-color);
            text-shadow: 0 0 5px var(--link-color);
        }

        .command-log {
            color: var(--dim-color);
            margin-top: 15px;
            margin-bottom: 5px;
        }

        .error-msg {
            color: var(--error-color);
        }

        .ascii-art {
            font-size: 12px;
            line-height: 1.2;
            color: var(--text-color);
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .ascii-art {
                font-size: 8px;
            }
            #terminal-body {
                font-size: 13px;
            }
            #cmd-input {
                font-size: 13px;
            }
        }

        .project-card {
            border: 1px dashed var(--dim-color);
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(0, 20, 0, 0.4);
            box-shadow: inset 0 0 10px rgba(51, 255, 51, 0.05);
        }
        
        .project-title {
            color: var(--highlight-color);
            font-weight: bold;
            margin-bottom: 5px;
        }

        .project-meta {
            color: var(--prompt-color);
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .skill-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .skill-category {
            border-left: 2px solid var(--prompt-color);
            padding-left: 10px;
        }
        
        .skill-category h4 {
            color: var(--highlight-color);
            margin-bottom: 5px;
        }

        /* Theme overrides */
        body.theme-amber {
            --text-color: #ffb000;
            --dim-color: #805000;
            --prompt-color: #00ff00;
            --link-color: #00ffff;
            --glow-amount: 0 0 5px var(--text-color);
        }
        
        body.theme-white {
            --text-color: #f0f0f0;
            --dim-color: #555;
            --prompt-color: #00ff00;
            --link-color: #3b82f6;
            --glow-amount: 0 0 2px var(--text-color);
        }
    </style>
</head>
<body>

    <div id="terminal-container">
        <div id="title-bar">
            <span>visitor@0xr10t:~</span>
            <div class="window-controls">
                <span></span><span></span><span></span>
            </div>
        </div>
        <div id="terminal-body" onclick="document.getElementById('cmd-input').focus()">
            <div id="output-area"></div>
            <div class="input-line">
                <span class="prompt-text" id="prompt-display">guest@soham:~$</span>
                <input type="text" id="cmd-input" autocomplete="off" spellcheck="false">
                <span class="cursor" id="cursor-block"></span>
            </div>
        </div>
    </div>

    <script>
        // --- Data & Config ---
        const CONFIG = {
            user: 'soham',
            hostname: '0xr10t',
            promptChar: '$',
            typingSpeed: 5
        };

        const ASCII_LOGO = `
  ___  __   __   __   _   _  ___  ___ 
 / __| \\ \\ / /  / /  | \\ | |/ __|/ _ \\
 \\__ \\  \\ V /  / /   |  \\| | (_| (_) |
 |___/   \\_/  /_/    |_|\\_|\\___|\\___/ 
                                     
`;

        const PROJECTS = [
            {
                name: "GhostProver",
                date: "Apr. – May 2026",
                tech: ["Noir", "TypeScript", "Solidity", "ZK", "TEE", "0G"],
                desc: "Built a privacy-preserving AI compliance verification system proving sensitive data handling policies using ZK proofs and TEE-verified inference.\n• Implemented end-to-end workflow: Noir ZK circuits, Poseidon2 commitments, batch proof generation, TypeScript SDK, CLI, MCP server, daemon API, and React operator console.\n• Integrated 0G Compute, Storage, and Chain to upload audit bundles and generate verifiable on-chain compliance receipts."
            },
            {
                name: "Teku Consensus Client Contributions",
                date: "Mar. 2026",
                tech: ["Java", "Ethereum", "Open Source"],
                desc: "Contributed to Teku, Consensys’ Ethereum consensus client, with 2 merged PRs improving production grade client code.\n• Merged contributions: PR 10408 and PR 10410."
            },
            {
                name: "Git from Scratch",
                date: "Jan. 2026",
                tech: ["Rust", "Systems Programming"],
                desc: "Implemented core Git internals from scratch in Rust through CodeCrafters.\n• Built functionality around object storage, hashing, repository structure, blob/tree objects, and Git-compatible command behavior.\n• Strengthened understanding of systems programming, file formats, CLI design, and distributed version control internals."
            },
            {
                name: "PM-AMM",
                date: "Nov. 2025",
                tech: ["Solidity", "Foundry", "DeFi"],
                desc: "Implemented a Prediction Market AMM inspired by Paradigm’s research on liquidity provisioning under asymmetric information.\n• Designed a probabilistic pricing mechanism to model belief-driven trade flows and liquidity provider exposure.\n• Built modular Foundry smart contracts with tests for pricing behavior, invariant checks, and gas-efficient on-chain execution."
            },
            {
                name: "Nexus",
                date: "Sept. – Oct. 2025",
                tech: ["TypeScript", "MCP", "Hyperliquid EVM"],
                desc: "Contributed to Nexus, an MCP server exposing blockchain tools for Hyperliquid EVM.\n• Enabled AI agents to safely query chain state and execute validated on-chain actions through typed tool calls.\n• Implemented TypeScript-based functionality with emphasis on type safety and clean tool schemas."
            },
            {
                name: "ElizaOS Agent Integration",
                date: "N/A",
                tech: ["TypeScript", "ElizaOS", "Blockchain Agents"],
                desc: "Developed autonomous AI agents for blockchain workflows using ElizaOS.\n• Created a reusable template for secure contract calls, state-aware execution, and structured blockchain tool integration."
            },
            {
                name: "PYB-protocol",
                date: "Mar. 2025",
                tech: ["Ethers.js", "Solidity", "Python", "CDP AgentKit"],
                desc: "DeFi Collateral+ Bond NFTs: Users deposit assets (ETH, USDC) and receive ERC-721 Bond NFTs representing ownership.\n• AI-Driven Strategy Optimization: Built AI agent modules for yield strategy, risk management, rebalancing, and oracle-based price tracking to optimize protocol returns."
            }
        ];

        const COMMANDS = {
            help: {
                desc: "List all available commands.",
                exec: () => {
                    let output = "Available commands:\n";
                    for (const [cmd, info] of Object.entries(COMMANDS)) {
                        output += `  <span style="color:var(--highlight-color)">${cmd}</span>${' '.repeat(Math.max(0, 15 - cmd.length))} ${info.desc}\n`;
                    }
                    return output;
                }
            },
            about: {
                desc: "Display summary about me.",
                exec: () => `
<span style="color:var(--highlight-color)">SUMMARY:</span>
Second-year undergraduate at <span style="color:var(--highlight-color)">IIT Roorkee</span>.
Deep interest in <span style="color:var(--prompt-color)">DeFi</span>, <span style="color:var(--prompt-color)">blockchain infrastructure</span>, and <span style="color:var(--prompt-color)">developer tooling</span>.
Passionate about designing on-chain financial primitives, protocol engineering, and liquidity mechanism design.
Actively building projects at the intersection of smart contracts, cryptoeconomics, and autonomous agent-driven DeFi systems.
`
            },
            projects: {
                desc: "List my projects.",
                exec: () => {
                    let html = `<span style="color:var(--highlight-color)">PROJECTS:</span>\n\n`;
                    PROJECTS.forEach((p, i) => {
                        html += `<div class="project-card">
<div class="project-title">[${i + 1}] ${p.name}</div>
<div class="project-meta">Date: ${p.date || 'N/A'} | Tech: [${p.tech.join(', ')}]</div>
<div>${p.desc}</div>
</div>\n`;
                    });
                    return html;
                }
            },
            skills: {
                desc: "Display technical skills.",
                exec: () => `
<span style="color:var(--highlight-color)">SKILLS:</span>
<div class="skill-grid">
    <div class="skill-category">
        <h4>LANGUAGES</h4>
        Solidity, C++, Rust, Python, Go, JavaScript, TypeScript, Java
    </div>
    <div class="skill-category">
        <h4>DEV TOOLS</h4>
        Github, Foundry, Git, VS Code, Remix, Postman, Godot
    </div>
    <div class="skill-category">
        <h4>TECH/FRAMEWORKS</h4>
        React, Node.js, Express.js, Ethers.js, Web3.js, Chainlink, MongoDB, Linux, Ethereum, 0G
    </div>
    <div class="skill-category">
        <h4>SOFT SKILLS</h4>
        Leadership, Communication, Event Management, Collaboration
    </div>
</div>
`
            },
            experience: {
                desc: "Show work experience.",
                exec: () => `
<span style="color:var(--highlight-color)">EXPERIENCE:</span>
<span style="color:var(--prompt-color)">BlocSocIITR | Member</span>
<span style="color:var(--dim-color)">Feb. 2025 – Present | Roorkee, Uttarakhand</span>
• Helped grow the campus blockchain community by organizing lectures, workshops, and hackathons for 700+ students.
• Contributed to international-level blockchain hackathons as a team member, developing real-world decentralized apps.
`
            },
            contact: {
                desc: "Display contact information.",
                exec: () => `
<span style="color:var(--highlight-color)">CONTACT:</span>
Email:    <a href="mailto:sohamvijaya1000@gmail.com">sohamvijaya1000@gmail.com</a>
Phone:    +917877749299
GitHub:   <a href="https://github.com/0xr10t" target="_blank">github.com/0xr10t</a>
X (Twitter): <a href="https://x.com/0xr10t" target="_blank">x.com/0xr10t</a>
`
            },
            clear: {
                desc: "Clear the terminal screen.",
                exec: () => {
                    document.getElementById('output-area').innerHTML = '';
                    return '';
                }
            },
            theme: {
                desc: "Change terminal color theme. Usage: theme [green|amber|white]",
                exec: (args) => {
                    const t = args[0]?.toLowerCase();
                    if (['green', 'amber', 'white'].includes(t)) {
                        document.body.className = t === 'green' ? '' : `theme-${t}`;
                        return `Theme switched to ${t}.`;
                    }
                    return `Usage: theme [green|amber|white]. Current: ${document.body.className.replace('theme-','') || 'green'}`;
                }
            },
            sudo: {
                desc: "Run as superuser.",
                exec: () => {
                    setTimeout(() => {
                        appendToOutput("<span class='error-msg'>Nice try. Permission denied.</span>\n");
                        scrollToBottom();
                    }, 500);
                    return "Authenticating...";
                }
            },
            ls: {
                desc: "List files in current directory.",
                exec: () => "about.txt  projects/  skills.log  experience.md  contact.info  .hidden_secrets"
            },
            cat: {
                desc: "Read file content. Usage: cat [filename]",
                exec: (args) => {
                    const f = args[0];
                    if (!f) return "Usage: cat [filename]";
                    if (f === 'about.txt') return COMMANDS.about.exec();
                    if (f === 'skills.log') return COMMANDS.skills.exec();
                    if (f === 'contact.info') return COMMANDS.contact.exec();
                    if (f === '.hidden_secrets') return "<span style='color:var(--highlight-color)'>🔓 ACCESS GRANTED: I build autonomous financial agents on chain. 🚀</span>";
                    return `cat: ${f}: No such file or directory`;
                }
            },
            pwd: {
                desc: "Print working directory.",
                exec: () => "/home/visitor/portfolio"
            },
            date: {
                desc: "Display current date.",
                exec: () => new Date().toString()
            }
        };

        // --- State ---
        let commandHistory = [];
        let historyIndex = -1;
        let isTyping = false;

        // --- DOM Elements ---
        const outputArea = document.getElementById('output-area');
        const cmdInput = document.getElementById('cmd-input');
        const cursorBlock = document.getElementById('cursor-block');
        const promptDisplay = document.getElementById('prompt-display');
        const terminalBody = document.getElementById('terminal-body');

        // --- Functions ---

        function init() {
            promptDisplay.textContent = `${CONFIG.user}@${CONFIG.hostname}:${CONFIG.promptChar}`;
            
            // Type logo and welcome message
            const welcomeMsg = `\nWelcome to <span style="color:var(--highlight-color)">${CONFIG.user}'s</span> portfolio terminal v2.0.0
Type <span style="color:var(--prompt-color)">'help'</span> to see available commands.\n`;

            typeText(ASCII_LOGO, () => {
                appendToOutput(welcomeMsg, false, () => {
                    cmdInput.focus();
                });
            });

            // Event Listeners
            cmdInput.addEventListener('keydown', handleInput);
            cmdInput.addEventListener('input', () => {});
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' || e.altKey) cmdInput.focus();
            });
        }

        function typeText(text, callback) {
            isTyping = true;
            cmdInput.style.display = 'none';
            cursorBlock.style.display = 'none';
            
            let i = 0;
            const span = document.createElement('span');
            span.className = 'ascii-art';
            outputArea.appendChild(span);

            function typeChar() {
                if (i < text.length) {
                    span.textContent += text.charAt(i);
                    i++;
                    scrollToBottom();
                    setTimeout(typeChar, CONFIG.typingSpeed);
                } else {
                    isTyping = false;
                    cmdInput.style.display = 'inline-block';
                    cursorBlock.style.display = 'inline-block';
                    if (callback) callback();
                }
            }
            typeChar();
        }

        function appendToOutput(html, scroll = true, callback = null) {
            const div = document.createElement('div');
            div.innerHTML = html;
            outputArea.appendChild(div);
            if (scroll) scrollToBottom();
            if (callback) callback();
        }

        function scrollToBottom() {
            terminalBody.scrollTop = terminalBody.scrollHeight;
        }

        function handleInput(e) {
            if (isTyping) return;

            if (e.key === 'Enter') {
                const val = cmdInput.value.trim();
                if (val) {
                    commandHistory.unshift(val);
                    historyIndex = -1;
                    processCommand(val);
                }
                cmdInput.value = '';
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    cmdInput.value = commandHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    cmdInput.value = commandHistory[historyIndex];
                } else {
                    historyIndex = -1;
                    cmdInput.value = '';
                }
            } else if (e.key === 'Tab') {
                e.preventDefault();
                autocomplete();
            }
        }

        function processCommand(input) {
            // Echo command
            appendToOutput(`<div class="command-line"><span class="prompt-text">${CONFIG.user}@${CONFIG.hostname}:${CONFIG.promptChar}</span> <span style="color:var(--highlight-color)">${escapeHtml(input)}</span></div>`);

            const parts = input.split(' ');
            const cmd = parts[0];
            const args = parts.slice(1);

            if (COMMANDS[cmd]) {
                let result = COMMANDS[cmd].exec(args);
                if (result) {
                    appendToOutput(result);
                }
            } else {
                appendToOutput(`<span class="error-msg">Command not found: ${cmd}. Type 'help' for options.</span>`);
            }
        }

        function autocomplete() {
            const val = cmdInput.value;
            if (!val) return;
            const matches = Object.keys(COMMANDS).filter(c => c.startsWith(val));
            if (matches.length === 1) {
                cmdInput.value = matches[0];
            } else if (matches.length > 1) {
                appendToOutput(`<div class="command-line"><span class="prompt-text">${CONFIG.user}@${CONFIG.hostname}:${CONFIG.promptChar}</span> <span style="color:var(--highlight-color)">${val}</span></div>`);
                appendToOutput(matches.join('  '));
            }
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Initial run
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
